<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNBR Art Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="window-frame">
        <svg class="top-panel-svg" preserveAspectRatio="none" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="30" fill="#D1DFFF"/>
            <defs>
                <pattern id="lines" width="1" height="30" patternUnits="userSpaceOnUse">
                    <line x1="0" y1="0" x2="0" y2="30" stroke="#B5C9FF" stroke-width="0.2"/>
                </pattern>
            </defs>
            <rect width="100" height="30" fill="url(#lines)"/>
            <line x1="0" y1="30" x2="100" y2="30" stroke="#A4B8FF" stroke-width="1.5"/>
        </svg>

        <div class="content">
            </div>
    </div>

</body>
</html>
